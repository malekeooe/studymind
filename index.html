<!DOCTYPE html>

<html>
<head><meta charset="UTF-8"><title>JS Test</title></head>
<body>
<h2>JavaScript Test</h2>
<button id="btn" style="padding:20px;font-size:18px;background:blue;color:white;border:none;border-radius:10px;cursor:pointer;">Klick mich!</button>
<p id="result" style="margin-top:20px;font-size:16px;">Noch nicht geklickt</p>
<script>
document.getElementById('btn').addEventListener('click', function() {
  document.getElementById('result').textContent = '✅ JavaScript funktioniert!';
  document.getElementById('result').style.color = 'green';
});
</script>
</body>
</html>
